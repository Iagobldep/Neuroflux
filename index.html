<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta charset="utf-8"/>
    <title>Neuroflux</title>

    <style>
        body {
            background: #000;
            color: #cccccc;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* CONTAINER DO JOGO */
        #gm4html5_div_id {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CANVAS RESPONSIVO */
        canvas {
            width: 100vw;
            height: 100vh;

            image-rendering: pixelated;
            margin: 0;
            padding: 0;
            border: 0;
        }

        /* remove comportamento estranho mobile */
        canvas:focus {
            outline: none;
        }

    </style>
</head>

<body>

<div class="gm4html5_div_class" id="gm4html5_div_id">

    <canvas id="canvas" width="1280" height="720">
        <p>Your browser doesn't support HTML5 canvas.</p>
    </canvas>

</div>

<script type="text/javascript" src="html5game/Neuroflux.js"></script>
<script>window.onload = GameMaker_Init;</script>

</body>
</html>
